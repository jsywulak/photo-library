<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tagger — Inbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #1e1e1e;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      text-transform: uppercase;
    }

    .status {
      padding: 3rem 2rem;
      text-align: center;
      color: #333;
      font-size: 0.875rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 3px;
      padding: 2rem;
    }

    .grid-item {
      aspect-ratio: 1;
      overflow: hidden;
      cursor: zoom-in;
      background: #1a1a1a;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s, opacity 0.2s;
    }

    .grid-item:hover img {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: zoom-out;
    }

    .lightbox.hidden { display: none; }

    .lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: none;
      color: #555;
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
    }

    .lightbox-close:hover { color: #ccc; }

    .lightbox-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      cursor: default;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 2px;
      cursor: default;
    }

    .lightbox-actions { display: flex; gap: 0.75rem; }

    .action-btn {
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-size: 0.8125rem;
      padding: 0.35rem 0.9rem;
    }

    .action-btn:hover { background: #2a2a2a; border-color: #666; }
    .action-btn--muted { color: #555; border-color: #2a2a2a; }
    .action-btn--muted:hover { color: #888; border-color: #444; }
    .action-btn:disabled { opacity: 0.4; cursor: default; }

    .lightbox-error { color: #c0392b; font-size: 0.8125rem; }
    .lightbox-error.hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>Photo Tagger — Inbox <span id="inbox-count"></span></h1>
  </header>

  <div id="status" class="status"></div>
  <div id="photo-grid" class="grid"></div>
  <div id="load-more-container" style="text-align:center;padding:1rem 2rem;">
    <button id="load-more-btn" class="action-btn" style="display:none;">Load more</button>
  </div>

  <div class="lightbox hidden" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox-actions">
        <button id="lightbox-archive" class="action-btn action-btn--muted">Archive</button>
        <button id="lightbox-process" class="action-btn">Process</button>
      </div>
      <div id="lightbox-error" class="lightbox-error hidden"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const BASE_URL   = SEARCHER_URL.replace(/\/$/, '');
    const status     = document.getElementById('status');
    const grid       = document.getElementById('photo-grid');
    const inboxCount = document.getElementById('inbox-count');
    const lightbox  = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    let currentS3Key    = null;
    let currentGridItem = null;
    let nextCursor      = null;
    let isLoading       = false;
    let totalCount      = null;

    const loadMoreBtn = document.getElementById('load-more-btn');

    // ── Inbox load ────────────────────────────────────────────────────────────

    async function loadInbox(cursor = null) {
      if (isLoading) return;
      isLoading = true;
      loadMoreBtn.style.display = 'none';

      if (cursor === null) {
        status.textContent = '';
        status.style.display = '';
      }

      try {
        let url = BASE_URL + '/inbox';
        if (cursor !== null) url += `?cursor=${cursor}`;
        const res = await fetch(url, { headers: { 'x-api-key': API_KEY } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = data.items;
        nextCursor = data.next_cursor ?? null;
        if (cursor === null) totalCount = data.total ?? null;
        appendToGrid(items, cursor === null);
        if (nextCursor !== null) loadMoreBtn.style.display = '';
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.style.display = '';
      } finally {
        isLoading = false;
      }
    }

    // ── Grid ──────────────────────────────────────────────────────────────────

    function appendToGrid(items, replace) {
      if (replace) grid.innerHTML = '';

      if (replace && items.length === 0) {
        status.textContent = 'No photos in inbox.';
        status.style.display = '';
        inboxCount.textContent = '';
        return;
      }

      status.style.display = 'none';

      items.forEach(result => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.dataset.url   = result.url;
        item.dataset.s3Key = result.s3_key;

        const img = document.createElement('img');
        img.src = result.thumbnail_url;
        img.alt = result.s3_key;
        img.loading = 'lazy';
        img.addEventListener('click', () => openLightbox(result.url, result.s3_key, item));

        item.appendChild(img);
        grid.appendChild(item);
      });

      inboxCount.textContent = totalCount !== null ? `(${totalCount})` : '';
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────

    function openLightbox(url, s3Key, gridItem) {
      lightboxImg.src = url;
      currentS3Key = s3Key;
      currentGridItem = gridItem;
      document.getElementById('lightbox-error').classList.add('hidden');
      document.getElementById('lightbox-process').disabled = false;
      document.getElementById('lightbox-archive').disabled = false;
      lightbox.classList.remove('hidden');
    }

    function closeLightbox() {
      lightbox.classList.add('hidden');
      lightboxImg.src = '';
      document.getElementById('lightbox-error').classList.add('hidden');
      document.getElementById('lightbox-process').disabled = false;
      document.getElementById('lightbox-archive').disabled = false;
    }

    async function inboxAction(endpoint) {
      const processBtn = document.getElementById('lightbox-process');
      const archiveBtn = document.getElementById('lightbox-archive');
      const errorDiv   = document.getElementById('lightbox-error');
      processBtn.disabled = true;
      archiveBtn.disabled = true;
      errorDiv.classList.add('hidden');
      try {
        const res = await fetch(BASE_URL + endpoint, {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-api-key': API_KEY },
          body: JSON.stringify({ s3_key: currentS3Key }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const nextItem = currentGridItem.nextElementSibling || currentGridItem.previousElementSibling;
        currentGridItem.remove();
        if (totalCount !== null) totalCount--;
        inboxCount.textContent = totalCount !== null && totalCount > 0 ? `(${totalCount})` : '';
        const remaining = grid.querySelectorAll('.grid-item').length;
        if (remaining === 0 && nextCursor !== null) {
          closeLightbox();
          loadInbox(nextCursor);
        } else if (nextItem) {
          openLightbox(nextItem.dataset.url, nextItem.dataset.s3Key, nextItem);
        } else {
          closeLightbox();
          if (totalCount === 0 || totalCount === null) {
            status.textContent = 'No photos in inbox.';
            status.style.display = '';
          }
        }
      } catch (err) {
        errorDiv.textContent = `Error: ${err.message}`;
        errorDiv.classList.remove('hidden');
        processBtn.disabled = false;
        archiveBtn.disabled = false;
      }
    }

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-process').addEventListener('click', () => inboxAction('/process-inbox'));
    document.getElementById('lightbox-archive').addEventListener('click', () => inboxAction('/archive-inbox'));

    loadMoreBtn.addEventListener('click', () => loadInbox(nextCursor));

    document.addEventListener('keydown', e => {
      if (lightbox.classList.contains('hidden')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowRight')  inboxAction('/process-inbox');
      if (e.key === 'ArrowLeft')   inboxAction('/archive-inbox');
    });

    loadInbox();
  </script>
</body>
</html>
