<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tagger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #1e1e1e;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      text-transform: uppercase;
    }

    .search-area {
      padding: 1.5rem 2rem;
    }

    .chip-input {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.375rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.5rem 0.625rem;
      min-height: 44px;
      cursor: text;
      transition: border-color 0.15s;
    }

    .chip-input:focus-within {
      border-color: #444;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: #252525;
      border: 1px solid #383838;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.8125rem;
      color: #ccc;
      white-space: nowrap;
    }

    .chip-remove {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .chip-remove:hover { color: #aaa; }

    .chip-input input {
      background: none;
      border: none;
      color: #e0e0e0;
      flex: 1;
      font-size: 0.875rem;
      min-width: 140px;
      outline: none;
    }

    .chip-input input::placeholder { color: #444; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      padding: 0 2rem 1.25rem;
    }

    .suggestion {
      background: none;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .suggestion:hover { border-color: #444; color: #bbb; }
    .suggestion.used  { opacity: 0.3; cursor: default; }

    .status {
      padding: 3rem 2rem;
      text-align: center;
      color: #333;
      font-size: 0.875rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 3px;
      padding: 0 2rem 2rem;
    }

    .grid-item {
      aspect-ratio: 1;
      overflow: hidden;
      cursor: zoom-in;
      background: #1a1a1a;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s, opacity 0.2s;
    }

    .grid-item:hover img {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: zoom-out;
    }

    .lightbox.hidden { display: none; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
      cursor: default;
    }

    .lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1.25rem;
      background: none;
      border: none;
      color: #555;
      font-size: 1.75rem;
      cursor: pointer;
      line-height: 1;
    }

    .lightbox-close:hover { color: #ccc; }
  </style>
</head>
<body>

  <header>
    <h1>Photo Tagger</h1>
  </header>

  <div class="search-area">
    <div class="chip-input" id="chip-input">
      <input id="tag-input" type="text" placeholder="Search by tag…" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div id="status" class="status">Add a tag to search.</div>
  <div id="grid" class="grid"></div>

  <div class="lightbox hidden" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="config.js"></script>
  <script>
    const chipInput   = document.getElementById('chip-input');
    const tagInput    = document.getElementById('tag-input');
    const status      = document.getElementById('status');
    const grid        = document.getElementById('grid');
    const suggestions = document.getElementById('suggestions');
    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    let tags = [];
    let debounceTimer = null;

    // ── Chip management ──────────────────────────────────────────────────────

    function addTag(raw) {
      const tag = raw.trim().toLowerCase();
      if (!tag || tags.includes(tag)) return;
      tags.push(tag);
      renderChips();
      renderSuggestions();
      scheduleSearch();
    }

    function removeTag(tag) {
      tags = tags.filter(t => t !== tag);
      renderChips();
      renderSuggestions();
      scheduleSearch();
    }

    function renderChips() {
      // Remove existing chips (leave the input intact)
      chipInput.querySelectorAll('.chip').forEach(el => el.remove());

      [...tags].reverse().forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `${tag} <button class="chip-remove" aria-label="Remove ${tag}">&times;</button>`;
        chip.querySelector('.chip-remove').addEventListener('click', () => removeTag(tag));
        chipInput.insertBefore(chip, tagInput);
      });
    }

    chipInput.addEventListener('click', () => tagInput.focus());

    tagInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        addTag(tagInput.value.replace(/,/g, ''));
        tagInput.value = '';
      } else if (e.key === 'Backspace' && tagInput.value === '' && tags.length > 0) {
        removeTag(tags[tags.length - 1]);
      }
    });

    // Handle pasting comma-separated tags
    tagInput.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      text.split(',').forEach(t => addTag(t));
      tagInput.value = '';
    });

    // ── Suggestions ───────────────────────────────────────────────────────────

    let suggestionTags = [];

    async function loadSuggestions() {
      try {
        const res = await fetch(SEARCHER_URL.replace(/\/$/, '') + '/tags', {
          headers: { 'x-api-key': API_KEY },
        });
        if (!res.ok) return;
        suggestionTags = await res.json();
        renderSuggestions();
      } catch (_) {}
    }

    function renderSuggestions() {
      suggestions.innerHTML = '';
      suggestionTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'suggestion' + (tags.includes(tag) ? ' used' : '');
        btn.textContent = tag;
        btn.addEventListener('click', () => {
          if (!tags.includes(tag)) addTag(tag);
        });
        suggestions.appendChild(btn);
      });
    }

    loadSuggestions();

    // ── Search ────────────────────────────────────────────────────────────────

    function scheduleSearch() {
      clearTimeout(debounceTimer);
      if (tags.length === 0) {
        grid.innerHTML = '';
        status.textContent = 'Add a tag to search.';
        status.style.display = '';
        return;
      }
      status.textContent = 'Searching…';
      status.style.display = '';
      grid.innerHTML = '';
      debounceTimer = setTimeout(doSearch, 400);
    }

    async function doSearch() {
      try {
        const res = await fetch(SEARCHER_URL, {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-api-key': API_KEY },
          body: JSON.stringify({ tags }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const results = await res.json();
        renderGrid(results);
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.style.display = '';
      }
    }

    // ── Grid ──────────────────────────────────────────────────────────────────

    function renderGrid(results) {
      grid.innerHTML = '';

      if (results.length === 0) {
        status.textContent = 'No photos found.';
        status.style.display = '';
        return;
      }

      status.style.display = 'none';

      results.forEach(result => {
        const item = document.createElement('div');
        item.className = 'grid-item';

        const img = document.createElement('img');
        img.src = result.url;
        img.alt = result.s3_key;
        img.loading = 'lazy';
        img.addEventListener('click', () => openLightbox(result.url));

        item.appendChild(img);
        grid.appendChild(item);
      });
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────

    function openLightbox(url) {
      lightboxImg.src = url;
      lightbox.classList.remove('hidden');
    }

    function closeLightbox() {
      lightbox.classList.add('hidden');
      lightboxImg.src = '';
    }

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
