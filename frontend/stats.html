<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tagger — Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #1e1e1e;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      text-transform: uppercase;
    }

    #stats-container {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
      max-width: 960px;
    }

    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: #e0e0e0;
      line-height: 1;
    }

    /* Info icon + CSS tooltip */
    .info-icon {
      color: #444;
      font-size: 0.7rem;
      cursor: help;
      position: relative;
      line-height: 1;
      flex-shrink: 0;
    }

    .info-icon::after {
      content: attr(data-tooltip);
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ccc;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      padding: 0.4rem 0.6rem;
      border-radius: 3px;
      width: 220px;
      white-space: normal;
      z-index: 10;
      pointer-events: none;
    }

    .info-icon:hover::after { display: block; }

    /* Top tags section spans full width */
    #top-tags-section {
      grid-column: 1 / -1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      max-width: 480px;
    }

    #top-tags-list {
      list-style: none;
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #top-tags-list li {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      color: #e0e0e0;
    }

    #top-tags-list .tag-count {
      color: #555;
    }

    .status {
      padding: 3rem 2rem;
      text-align: center;
      color: #333;
      font-size: 0.875rem;
    }

    #stats-error {
      display: none;
      padding: 1rem 1.5rem;
      margin: 2rem;
      background: #1a1a1a;
      border: 1px solid #3a1a1a;
      border-radius: 4px;
      color: #c0392b;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Stats</h1>
  </header>

  <div id="stats-container" style="display:none">
    <div class="stat-card">
      <span class="stat-label">
        Inbox
        <span class="info-icon" data-tooltip="Photos waiting to be reviewed in the inbox.">ⓘ</span>
      </span>
      <span class="stat-value" id="inbox-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        In database
        <span class="info-icon" data-tooltip="Photos recorded in the database as processed.">ⓘ</span>
      </span>
      <span class="stat-value" id="db-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Archived
        <span class="info-icon" data-tooltip="Inbox photos that have been archived (soft-deleted).">ⓘ</span>
      </span>
      <span class="stat-value" id="archived-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Total photos
        <span class="info-icon" data-tooltip="Sum of all inbox, processed, and archived photos in the database.">ⓘ</span>
      </span>
      <span class="stat-value" id="total-photos-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Inbox S3 total
        <span class="info-icon" data-tooltip="Total objects in the inbox S3 bucket, including untracked files.">ⓘ</span>
      </span>
      <span class="stat-value" id="inbox-s3-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Processed S3 total
        <span class="info-icon" data-tooltip="Total objects in the processed photos S3 bucket.">ⓘ</span>
      </span>
      <span class="stat-value" id="processed-s3-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Thumbnails
        <span class="info-icon" data-tooltip="Total thumbnails in the thumbnail S3 bucket.">ⓘ</span>
      </span>
      <span class="stat-value" id="thumbnail-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Orphaned thumbnails
        <span class="info-icon" data-tooltip="Thumbnails with no matching photo in the database.">ⓘ</span>
      </span>
      <span class="stat-value" id="orphaned-thumbnails-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Orphaned processed
        <span class="info-icon" data-tooltip="Objects in the processed S3 bucket with no database record.">ⓘ</span>
      </span>
      <span class="stat-value" id="orphaned-processed-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Orphaned inbox
        <span class="info-icon" data-tooltip="Objects in the inbox S3 bucket with no database record.">ⓘ</span>
      </span>
      <span class="stat-value" id="orphaned-inbox-count">—</span>
    </div>
    <div id="top-tags-section">
      <span class="stat-label">
        Top tags
        <span class="info-icon" data-tooltip="The 5 most frequently used tags across all processed photos.">ⓘ</span>
      </span>
      <ol id="top-tags-list"></ol>
    </div>
  </div>

  <div id="stats-loading" class="status">Loading…</div>
  <div id="stats-error">Failed to load stats.</div>

  <script src="config.js"></script>
  <script>
    const BASE_URL = (typeof STATS_URL !== 'undefined' ? STATS_URL : '').replace(/\/$/, '');

    async function loadStats() {
      try {
        const res = await fetch(BASE_URL + '/stats', {
          headers: { 'x-api-key': API_KEY },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('inbox-count').textContent = data.inbox_count;
        document.getElementById('db-count').textContent = data.db_count;
        document.getElementById('archived-count').textContent = data.archived_count;
        document.getElementById('total-photos-count').textContent = data.total_photos;
        document.getElementById('inbox-s3-count').textContent = data.inbox_s3_count;
        document.getElementById('processed-s3-count').textContent = data.processed_s3_count;
        document.getElementById('thumbnail-count').textContent = data.thumbnail_count;
        document.getElementById('orphaned-thumbnails-count').textContent = data.orphaned_thumbnails;
        document.getElementById('orphaned-processed-count').textContent = data.orphaned_processed;
        document.getElementById('orphaned-inbox-count').textContent = data.orphaned_inbox;

        const list = document.getElementById('top-tags-list');
        if (data.top_tags.length === 0) {
          list.innerHTML = '<li style="color:#555">No tags yet.</li>';
        } else {
          data.top_tags.forEach(tag => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${tag.name}</span><span class="tag-count">${tag.count}</span>`;
            list.appendChild(li);
          });
        }

        document.getElementById('stats-loading').style.display = 'none';
        document.getElementById('stats-container').style.display = 'grid';
      } catch (err) {
        document.getElementById('stats-loading').style.display = 'none';
        document.getElementById('stats-error').style.display = 'block';
      }
    }

    loadStats();
  </script>
</body>
</html>
