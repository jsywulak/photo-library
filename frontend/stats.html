<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tagger — Stats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #1e1e1e;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #888;
      text-transform: uppercase;
    }

    #stats-container {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
      max-width: 960px;
    }

    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      color: #e0e0e0;
      line-height: 1;
    }

    .stat-value.error {
      font-size: 1rem;
      color: #c0392b;
    }

    /* Info icon + CSS tooltip */
    .info-icon {
      color: #444;
      font-size: 0.7rem;
      cursor: help;
      position: relative;
      line-height: 1;
      flex-shrink: 0;
    }

    .info-icon::after {
      content: attr(data-tooltip);
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #ccc;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      padding: 0.4rem 0.6rem;
      border-radius: 3px;
      width: 220px;
      white-space: normal;
      z-index: 10;
      pointer-events: none;
    }

    .info-icon:hover::after { display: block; }

    /* Top tags section spans full width */
    #top-tags-section {
      grid-column: 1 / -1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      max-width: 480px;
    }

    #top-tags-list {
      list-style: none;
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #top-tags-list li {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      color: #e0e0e0;
    }

    #top-tags-list .tag-count {
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>Stats</h1>
  </header>

  <div id="stats-container">
    <div class="stat-card">
      <span class="stat-label">
        Inbox
        <span class="info-icon" data-tooltip="Photos waiting to be reviewed in the inbox.">ⓘ</span>
      </span>
      <span class="stat-value" id="inbox-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        In database
        <span class="info-icon" data-tooltip="Photos recorded in the database as processed.">ⓘ</span>
      </span>
      <span class="stat-value" id="db-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Archived
        <span class="info-icon" data-tooltip="Inbox photos that have been archived (soft-deleted).">ⓘ</span>
      </span>
      <span class="stat-value" id="archived-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Total photos
        <span class="info-icon" data-tooltip="Sum of all inbox, processed, and archived photos in the database.">ⓘ</span>
      </span>
      <span class="stat-value" id="total-photos-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Inbox S3 total
        <span class="info-icon" data-tooltip="Total objects in the inbox S3 bucket, including untracked files.">ⓘ</span>
      </span>
      <span class="stat-value" id="inbox-s3-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Processed S3 total
        <span class="info-icon" data-tooltip="Total objects in the processed photos S3 bucket.">ⓘ</span>
      </span>
      <span class="stat-value" id="processed-s3-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Thumbnails
        <span class="info-icon" data-tooltip="Total thumbnails in the thumbnail S3 bucket.">ⓘ</span>
      </span>
      <span class="stat-value" id="thumbnail-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Orphaned thumbnails
        <span class="info-icon" data-tooltip="Thumbnails with no matching photo in the database.">ⓘ</span>
      </span>
      <span class="stat-value" id="orphaned-thumbnails-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Orphaned processed
        <span class="info-icon" data-tooltip="Objects in the processed S3 bucket with no database record.">ⓘ</span>
      </span>
      <span class="stat-value" id="orphaned-processed-count">—</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">
        Orphaned inbox
        <span class="info-icon" data-tooltip="Objects in the inbox S3 bucket with no database record.">ⓘ</span>
      </span>
      <span class="stat-value" id="orphaned-inbox-count">—</span>
    </div>
    <div id="top-tags-section">
      <span class="stat-label">
        Top tags
        <span class="info-icon" data-tooltip="The 5 most frequently used tags across all processed photos.">ⓘ</span>
      </span>
      <ol id="top-tags-list"></ol>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const BASE_URL = (typeof STATS_URL !== 'undefined' ? STATS_URL : '').replace(/\/$/, '');
    const HEADERS = { 'x-api-key': API_KEY };

    function set(id, text) {
      document.getElementById(id).textContent = text;
    }

    function setError(id) {
      const el = document.getElementById(id);
      el.textContent = 'err';
      el.classList.add('error');
    }

    function fetchStat(path) {
      return fetch(BASE_URL + path, { headers: HEADERS })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(data => data.value);
    }

    // Track the three DB counts needed to compute total photos
    const totals = {};
    function maybeUpdateTotal() {
      if ('inbox' in totals && 'db' in totals && 'archived' in totals)
        set('total-photos-count', totals.inbox + totals.db + totals.archived);
    }

    fetchStat('/stats/inbox-count')
      .then(v => { set('inbox-count', v); totals.inbox = v; maybeUpdateTotal(); })
      .catch(() => { setError('inbox-count'); totals.inbox = 0; maybeUpdateTotal(); });

    fetchStat('/stats/db-count')
      .then(v => { set('db-count', v); totals.db = v; maybeUpdateTotal(); })
      .catch(() => { setError('db-count'); totals.db = 0; maybeUpdateTotal(); });

    fetchStat('/stats/archived-count')
      .then(v => { set('archived-count', v); totals.archived = v; maybeUpdateTotal(); })
      .catch(() => { setError('archived-count'); totals.archived = 0; maybeUpdateTotal(); });

    fetchStat('/stats/inbox-s3-count')
      .then(v => set('inbox-s3-count', v))
      .catch(() => setError('inbox-s3-count'));

    fetchStat('/stats/processed-s3-count')
      .then(v => set('processed-s3-count', v))
      .catch(() => setError('processed-s3-count'));

    fetchStat('/stats/thumbnail-count')
      .then(v => set('thumbnail-count', v))
      .catch(() => setError('thumbnail-count'));

    fetchStat('/stats/orphaned-thumbnails')
      .then(v => set('orphaned-thumbnails-count', v))
      .catch(() => setError('orphaned-thumbnails-count'));

    fetchStat('/stats/orphaned-processed')
      .then(v => set('orphaned-processed-count', v))
      .catch(() => setError('orphaned-processed-count'));

    fetchStat('/stats/orphaned-inbox')
      .then(v => set('orphaned-inbox-count', v))
      .catch(() => setError('orphaned-inbox-count'));

    fetchStat('/stats/top-tags').then(tags => {
      const list = document.getElementById('top-tags-list');
      if (!tags || tags.length === 0) {
        list.innerHTML = '<li style="color:#555">No tags yet.</li>';
      } else {
        tags.forEach(tag => {
          const li = document.createElement('li');
          li.innerHTML = `<span>${tag.name}</span><span class="tag-count">${tag.count}</span>`;
          list.appendChild(li);
        });
      }
    }).catch(() => {
      document.getElementById('top-tags-list').innerHTML = '<li style="color:#c0392b">err</li>';
    });
  </script>
</body>
</html>
