AWSTemplateFormatVersion: '2010-09-09'
Description: Photo Tagger — Upload staging S3 bucket

Parameters:
  UploadBucketName:
    Type: String
    Default: photo-tagging-upload
    Description: Name of the S3 bucket for staged uploads before hash-renaming

Resources:
  UploadBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref UploadBucketName
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

Outputs:
  UploadBucketName:
    Description: S3 staging bucket for uploads
    Value: !Ref UploadBucket
