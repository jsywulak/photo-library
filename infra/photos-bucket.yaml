AWSTemplateFormatVersion: '2010-09-09'
Description: Photo Tagger — Photos S3 bucket

Parameters:
  PhotosBucketName:
    Type: String
    Default: photo-tagging-photos
    Description: Name of the S3 bucket for source photos

Resources:
  PhotosBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref PhotosBucketName
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

Outputs:
  PhotosBucketName:
    Description: S3 bucket for photos
    Value: !Ref PhotosBucket
