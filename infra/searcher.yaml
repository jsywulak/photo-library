AWSTemplateFormatVersion: '2010-09-09'
Description: Photo Tagger — Searcher Lambda

Parameters:
  DeploymentBucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment zip

  DeploymentKey:
    Type: String
    Default: searcher.zip
    Description: S3 key of the Lambda deployment zip

  NeonDatabaseUrl:
    Type: String
    NoEcho: true
    Description: Neon PostgreSQL connection string

  ApiKey:
    Type: String
    NoEcho: true
    Description: Secret key required in the x-api-key request header

Resources:
  SearcherRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  SearcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-searcher'
      Runtime: python3.12
      Handler: searcher_handler.lambda_handler
      Role: !GetAtt SearcherRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref DeploymentKey
      Environment:
        Variables:
          NEON_DATABASE_URL: !Ref NeonDatabaseUrl
          API_KEY: !Ref ApiKey

  SearcherFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt SearcherFunction.Arn

  SearcherFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SearcherFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  SearcherFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SearcherFunction.Arn
      Action: lambda:InvokeFunction
      Principal: "*"

Outputs:
  SearcherFunctionName:
    Description: Lambda function name (use as SEARCHER_LAMBDA_NAME in .env)
    Value: !Ref SearcherFunction

  SearcherFunctionUrl:
    Description: HTTP endpoint for the searcher (use as SEARCHER_URL in .env)
    Value: !GetAtt SearcherFunctionUrl.FunctionUrl
