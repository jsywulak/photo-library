AWSTemplateFormatVersion: '2010-09-09'
Description: Photo Tagger — Inbox Lambda

Parameters:
  DeploymentBucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment zip

  DeploymentKey:
    Type: String
    Default: inbox.zip
    Description: S3 key of the Lambda deployment zip

  NeonDatabaseUrl:
    Type: String
    NoEcho: true
    Description: Neon PostgreSQL connection string

  ApiKey:
    Type: String
    NoEcho: true
    Description: Secret key required in the x-api-key request header

  PhotosBucket:
    Type: String
    Description: S3 bucket to promote processed photos into

  ThumbnailBucket:
    Type: String
    Default: photo-tagging-thumbnails
    Description: Public S3 bucket containing thumbnails

  InboxBucket:
    Type: String
    Description: S3 bucket containing unprocessed photos

Resources:
  InboxRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InboxS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${PhotosBucket}/*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub 'arn:aws:s3:::${InboxBucket}'
                  - !Sub 'arn:aws:s3:::${InboxBucket}/*'

  InboxFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-inbox'
      Runtime: python3.12
      Handler: inbox_handler.lambda_handler
      Role: !GetAtt InboxRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref DeploymentKey
      Environment:
        Variables:
          NEON_DATABASE_URL: !Ref NeonDatabaseUrl
          API_KEY: !Ref ApiKey
          PHOTOS_BUCKET: !Ref PhotosBucket
          THUMBNAIL_BUCKET: !Ref ThumbnailBucket
          INBOX_BUCKET: !Ref InboxBucket

  InboxFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt InboxFunction.Arn

  InboxFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt InboxFunction.Arn
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  # Required alongside InvokeFunctionUrl — Lambda URL invocations need both.
  # The InvokedViaFunctionUrl condition restricts this to URL-triggered calls only,
  # preventing direct lambda:InvokeFunction calls that would bypass the API key check.
  InboxFunctionInvokeViaUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt InboxFunction.Arn
      Action: lambda:InvokeFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

Outputs:
  InboxFunctionName:
    Description: Lambda function name (use as INBOX_LAMBDA_NAME in .env)
    Value: !Ref InboxFunction

  InboxFunctionUrl:
    Description: HTTP endpoint for the inbox lambda (use as INBOX_URL in .env)
    Value: !GetAtt InboxFunctionUrl.FunctionUrl
