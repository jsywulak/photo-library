AWSTemplateFormatVersion: '2010-09-09'
Description: Photo Tagger — Processor v2 Lambda

Parameters:
  DeploymentBucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment zip

  DeploymentKey:
    Type: String
    Default: processor-v2.zip
    Description: S3 key of the Lambda deployment zip

  NeonDatabaseUrl:
    Type: String
    NoEcho: true
    Description: Neon PostgreSQL connection string

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key

  PhotosBucket:
    Type: String
    Description: S3 bucket the Lambda reads source photos from

  InboxBucket:
    Type: String
    Description: S3 bucket for unprocessed inbox photos

Resources:
  ProcessorV2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadPhotos
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${PhotosBucket}/*'
                  - !Sub 'arn:aws:s3:::${InboxBucket}/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${PhotosBucket}'
                  - !Sub 'arn:aws:s3:::${InboxBucket}'
              # PutObject is required for the post-tagging self-CopyObject that
              # stamps tagged-by-model + pipeline-stage=tagged metadata onto the
              # photo object. Limited to the photos bucket — we never write to inbox.
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${PhotosBucket}/*'

  ProcessorV2Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-processor'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt ProcessorV2Role.Arn
      Timeout: 120
      MemorySize: 512
      ReservedConcurrentExecutions: 3
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref DeploymentKey
      Environment:
        Variables:
          NEON_DATABASE_URL: !Ref NeonDatabaseUrl
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey

  ProcessorV2EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref PhotosBucket
              - !Ref InboxBucket
      Targets:
        - Id: ProcessorV2LambdaTarget
          Arn: !GetAtt ProcessorV2Function.Arn

  ProcessorV2EventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessorV2Function.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ProcessorV2EventBridgeRule.Arn

  # Dead-Letter Queue for async invocations that exhaust retries.
  # The Lambda async-invoke path (EventBridge → Lambda, direct async invoke)
  # publishes the failed event here so work isn't silently lost.
  ProcessorV2DLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-dlq'
      MessageRetentionPeriod: 1209600  # 14 days

  # Permission for the Lambda role to write failed events to the DLQ.
  ProcessorV2DLQPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ProcessorV2DLQWrite
      Roles:
        - !Ref ProcessorV2Role
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: sqs:SendMessage
            Resource: !GetAtt ProcessorV2DLQ.Arn

  # Async-invoke config: skip retries (fail fast → DLQ) and route failures to SQS.
  # MaximumRetryAttempts=0 keeps the test fast and avoids replaying expensive
  # tagging work that we already know failed.
  ProcessorV2EventInvokeConfig:
    Type: AWS::Lambda::EventInvokeConfig
    DependsOn: ProcessorV2DLQPolicy
    Properties:
      FunctionName: !Ref ProcessorV2Function
      Qualifier: $LATEST
      MaximumRetryAttempts: 0
      DestinationConfig:
        OnFailure:
          Destination: !GetAtt ProcessorV2DLQ.Arn

Outputs:
  ProcessorV2FunctionName:
    Description: Lambda function name (use as PROCESSOR_V2_LAMBDA_NAME in .env)
    Value: !Ref ProcessorV2Function

  ProcessorV2FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ProcessorV2Function.Arn

  ProcessorV2DLQUrl:
    Description: SQS URL for the processor v2 DLQ (use as PROCESSOR_V2_DLQ_URL in .env)
    Value: !Ref ProcessorV2DLQ

  ProcessorV2DLQArn:
    Description: SQS ARN for the processor v2 DLQ
    Value: !GetAtt ProcessorV2DLQ.Arn
