AWSTemplateFormatVersion: '2010-09-09'
Description: Photo Tagger — Processor v2 Lambda

Parameters:
  DeploymentBucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment zip

  DeploymentKey:
    Type: String
    Default: processor-v2.zip
    Description: S3 key of the Lambda deployment zip

  NeonDatabaseUrl:
    Type: String
    NoEcho: true
    Description: Neon PostgreSQL connection string

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key

  PhotosBucket:
    Type: String
    Description: S3 bucket the Lambda reads source photos from

  InboxBucket:
    Type: String
    Description: S3 bucket for unprocessed inbox photos

Resources:
  ProcessorV2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadPhotos
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${PhotosBucket}/*'
                  - !Sub 'arn:aws:s3:::${InboxBucket}/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${PhotosBucket}'
                  - !Sub 'arn:aws:s3:::${InboxBucket}'

  ProcessorV2Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-processor'
      Runtime: python3.12
      Handler: handler.lambda_handler
      Role: !GetAtt ProcessorV2Role.Arn
      Timeout: 120
      MemorySize: 512
      ReservedConcurrentExecutions: 3
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Ref DeploymentKey
      Environment:
        Variables:
          NEON_DATABASE_URL: !Ref NeonDatabaseUrl
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey

  ProcessorV2EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref PhotosBucket
              - !Ref InboxBucket
      Targets:
        - Id: ProcessorV2LambdaTarget
          Arn: !GetAtt ProcessorV2Function.Arn

  ProcessorV2EventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessorV2Function.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ProcessorV2EventBridgeRule.Arn

Outputs:
  ProcessorV2FunctionName:
    Description: Lambda function name (use as PROCESSOR_V2_LAMBDA_NAME in .env)
    Value: !Ref ProcessorV2Function

  ProcessorV2FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ProcessorV2Function.Arn
